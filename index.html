function SvgChart({data, dataKey, color="#88A2FF", unit="", doseChangeWeek=null, h=150}) {
  const vals = data.map(d=>d[dataKey]).filter(v=>v!=null);
  if(vals.length<2) return null;
  const W=360, H=h-28, PAD={l:36,r:12,t:8,b:20};
  const minV=Math.min(...vals), maxV=Math.max(...vals);
  const rng=(maxV-minV)||1;
  const px=(i)=>PAD.l+(i/(data.length-1))*(W-PAD.l-PAD.r);
  const py=(v)=>PAD.t+(1-(v-minV)/rng)*(H-PAD.t-PAD.b);
  const pts=data.map((d,i)=>`${px(i)},${py(d[dataKey])}`).join(" ");
  // area fill
  const area=`${px(0)},${H-PAD.b} `+data.map((d,i)=>`${px(i)},${py(d[dataKey])}`).join(" ")+` ${px(data.length-1)},${H-PAD.b}`;
  // y ticks
  const ticks=[minV,minV+rng/2,maxV].map(v=>Math.round(v*10)/10);
  // x ticks (every 3rd label)
  const doseX = doseChangeWeek ? px(data.findIndex(d=>parseInt(d.week)>=doseChangeWeek)) : null;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:h-12,display:"block"}}>
      {/* grid */}
      {ticks.map(t=><line key={t} x1={PAD.l} x2={W-PAD.r} y1={py(t)} y2={py(t)} stroke="#e5e7eb" strokeWidth={0.8}/>)}
      {/* dose change line */}
      {doseX&&<line x1={doseX} x2={doseX} y1={PAD.t} y2={H-PAD.b} stroke={P.lavender} strokeWidth={1.2} strokeDasharray="4 2"/>}
      {/* area */}
      <polygon points={area} fill={color} opacity={0.07}/>
      {/* line */}
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
      {/* dots */}
      {data.map((d,i)=><circle key={i} cx={px(i)} cy={py(d[dataKey])} r={3} fill={d.dose==="5.0"?P.pink:P.blue} stroke={d.dose==="5.0"?P.lavender:P.navy} strokeWidth={1.2}/>)}
      {/* y labels */}
      {ticks.map(t=><text key={t} x={PAD.l-4} y={py(t)+3.5} textAnchor="end" fontSize={8} fill="#9ca3af">{t}{unit}</text>)}
      {/* x labels every ~3 points */}
      {data.map((d,i)=>i%3===0?<text key={i} x={px(i)} y={H-PAD.b+12} textAnchor="middle" fontSize={8} fill="#9ca3af">{d.week}</text>:null)}
    </svg>
  );
}

// ── App ───────────────────────────────────────────────────────
function todayKey(){
  const d=new Date();
  return String(d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}
function initWeekState(){
  const tk=todayKey();
  // 오늘 날짜가 포함되는 주차 찾기 (오늘 >= 투약일 인 마지막 주)
  let wi=0;
  for(let i=0;i<INJECTIONS.length;i++){ if(INJECTIONS[i].key<=tk) wi=i; else break; }
  // 해당 주의 7일 안에 오늘이 있으면 selDay=오늘, 없으면 투약일
  const days=Array.from({length:7},(_,i)=>shift(INJECTIONS[wi].key,i));
  return {wi, sd: days.includes(tk)?tk:INJECTIONS[wi].key};
}
const _init=initWeekState();
function App() {
  const [weekIdx,setWeekIdx]=useState(_init.wi);
  const [selDay, setSelDay] =useState(_init.sd);
  const [tab,    setTab]    =useState("week");
  const [logs, setLogs] = useState(()=>{
    try{const s=localStorage.getItem('ml_logs');return s?JSON.parse(s):INIT_LOGS;}
    catch{return INIT_LOGS;}
  });
  const [editing,setEditing]=useState(false);
  const [editLog,setEditLog]=useState(null);
  const [injF,   setInjF]   =useState({weight:"",muscle:"",bodyFat:"",waist:""});
  const [goals, setGoals] = useState(()=>{
    try{const s=localStorage.getItem('ml_goals');return s?JSON.parse(s):{weight:47,bodyFat:27};}
    catch{return {weight:47,bodyFat:27};}
  });
  const swipeX=useRef(0), swipeY=useRef(0);
  const [pullDist, setPullDist] = useState(0);
  const pullRef = useRef(0);
  const tabRef = useRef(tab);
  const weekIdxRef = useRef(weekIdx);
  useEffect(()=>{tabRef.current=tab;},[tab]);
  useEffect(()=>{weekIdxRef.current=weekIdx;},[weekIdx]);

  useEffect(()=>{
    const onStart = e => {
      swipeX.current = e.touches[0].clientX;
      swipeY.current = e.touches[0].clientY;
      pullRef.current = 0;
    };
    const onMove = e => {
      const dy = e.touches[0].clientY - swipeY.current;
      const dx = e.touches[0].clientX - swipeX.current;
      const atTop = (window.scrollY||document.documentElement.scrollTop||0) <= 0;
      if(dy > 5 && Math.abs(dy) > Math.abs(dx) && atTop){
        e.preventDefault();
        const d = Math.min(dy * 0.65, 80);
        pullRef.current = d;
        setPullDist(d);
      }
    };
    const onEnd = e => {
      const dx = e.changedTouches[0].clientX - swipeX.current;
      const dy = e.changedTouches[0].clientY - swipeY.current;
      const pulled = pullRef.current;
      pullRef.current = 0;
      setPullDist(0);
      const atTop = (window.scrollY||document.documentElement.scrollTop||0) <= 0;
      // pullRef 또는 직접 dy로 이중 체크
      if((pulled > 35 || (dy > 60 && Math.abs(dy) > Math.abs(dx)*1.5)) && atTop){
        setTimeout(()=>{ try{location.reload();}catch(e){window.location.href=window.location.href;} }, 80);
        return;
      }
      if(tabRef.current !== "week") return;
      if(Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
      const wi = weekIdxRef.current;
      if(dx < 0 && wi < INJECTIONS.length-1){const ni=wi+1;setWeekIdx(ni);setSelDay(INJECTIONS[ni].key);setEditing(false);}
      else if(dx > 0 && wi > 0){const ni=wi-1;setWeekIdx(ni);setSelDay(INJECTIONS[ni].key);setEditing(false);}
    };
    document.addEventListener('touchstart', onStart, {passive:true});
    document.addEventListener('touchmove',  onMove,  {passive:false});
    document.addEventListener('touchend',   onEnd,   {passive:true});
    return ()=>{
      document.removeEventListener('touchstart', onStart);
      document.removeEventListener('touchmove',  onMove);
      document.removeEventListener('touchend',   onEnd);
    };
  },[]);
  const INIT_INJM=Object.fromEntries(INJECTIONS.map(i=>[i.key,{weight:i.weight||null,muscle:i.muscle||null,bodyFat:i.bodyFat||null,waist:i.waist||null}]));
  const [injM, setInjM] = useState(()=>{
    try{const s=localStorage.getItem('ml_injm');return s?{...INIT_INJM,...JSON.parse(s)}:INIT_INJM;}
    catch{return INIT_INJM;}
  });

  const inj     =INJECTIONS[weekIdx];
  const theme   =getTheme(inj.dose);
  const weekDays=Array.from({length:7},(_,i)=>shift(inj.key,i));
  const selLog  =logs[selDay]||{};
  const injDay  =INJ[selDay];
  // curM: 항상 투약일(inj.key) 기준 고정 / INJECTIONS 원본 fallback
  const curM = (()=>{const m=injM[inj.key]||{};return{
    weight:  m.weight  ??inj.weight  ??null,
    waist:   m.waist   ??inj.waist   ??null,
    bodyFat: m.bodyFat ??inj.bodyFat ??null,
    muscle:  m.muscle  ??inj.muscle  ??null,
  };})();

  const startEdit=()=>{setEditLog({...EMPTY_LOG,...selLog});setInjF({weight:"",muscle:"",bodyFat:"",waist:""});setEditing(true);};
  const saveEdit =()=>{
    setLogs(p=>({...p,[selDay]:editLog}));
    if(injDay){
      const pf=v=>v?parseFloat(v):null;
      const n={weight:pf(injF.weight),muscle:pf(injF.muscle),bodyFat:pf(injF.bodyFat),waist:pf(injF.waist)};
      setInjM(p=>({...p,[selDay]:{weight:n.weight??p[selDay]?.weight,muscle:n.muscle??p[selDay]?.muscle,bodyFat:n.bodyFat??p[selDay]?.bodyFat,waist:n.waist??p[selDay]?.waist}}));
    }
    setEditing(false);
  };
  const setField=(f,v)=>setEditLog(p=>({...p,[f]:v}));
  const toggleArr=(f,v)=>{const a=editLog[f]||[];setField(f,a.includes(v)?a.filter(x=>x!==v):[...a,v]);};
  const setNested=(f,s,v)=>setEditLog(p=>({...p,[f]:{...(p[f]||{}),[s]:v}}));
  const toggleNestedArr=(f,s,v)=>{const a=(editLog[f]?.[s])||[];setNested(f,s,a.includes(v)?a.filter(x=>x!==v):[...a,v]);};
  const goPrev=()=>{if(weekIdx>0){setWeekIdx(w=>w-1);setSelDay(INJECTIONS[weekIdx-1].key);setEditing(false);}};

  useEffect(()=>{try{localStorage.setItem('ml_logs',JSON.stringify(logs));}catch{}},[logs]);
  useEffect(()=>{try{localStorage.setItem('ml_injm',JSON.stringify(injM));}catch{}},[injM]);
  useEffect(()=>{try{localStorage.setItem('ml_goals',JSON.stringify(goals));}catch{}},[goals]);

  const goNext=()=>{if(weekIdx<INJECTIONS.length-1){setWeekIdx(w=>w+1);setSelDay(INJECTIONS[weekIdx+1].key);setEditing(false);}};

  return (
    <div style={{minHeight:"100vh",background:"#f5f6fb",fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",maxWidth:430,margin:"0 auto"}}>

      {/* 당겨서 새로고침 인디케이터 */}
      {pullDist>0&&(
        <div style={{position:"fixed",top:0,left:0,height:3,zIndex:10000,pointerEvents:"none",
          width:`${Math.min(pullDist/40*100,100)}%`,
          background:"#fff",borderRadius:"0 2px 2px 0"}}/>
      )}
      {pullDist>5&&(
        <div style={{
          position:"fixed",
          top:"max(54px,calc(env(safe-area-inset-top) + 8px))",
          left:"50%",transform:"translateX(-50%)",
          background:P.neon,color:P.navy,
          paddingTop:10,paddingBottom:7,paddingLeft:20,paddingRight:20,
          borderRadius:999,
          fontSize:11,fontWeight:700,lineHeight:1,
          zIndex:9999,pointerEvents:"none",
          opacity:Math.min(pullDist/40,1),
          boxShadow:"0 4px 16px rgba(0,0,0,0.14)",
          whiteSpace:"nowrap",
        }}>
          {pullDist>40?"↑ 놓으면 새로고침":"↓ 당겨서 새로고침"}
        </div>
      )}

      {/* HEADER – sticky, 탭별 다른 콘텐츠 */}
      <header style={{background:tab==="history"?P.navy:theme.hBg,padding:"44px 22px 18px",position:"sticky",top:0,zIndex:20}}>
        <div style={{color:tab==="history"?"rgba(255,255,255,0.5)":theme.hSub,fontSize:10,letterSpacing:1.2,marginBottom:10,lineHeight:1}}>GET HEALTHY</div>

        {tab==="week"?(
          <>
            {/* 고정 높이 레이아웃 – 주차 이동해도 크기 안 바뀜 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,minHeight:92}}>
              <div style={{flex:1,minHeight:92,display:"flex",flexDirection:"column",justifyContent:"flex-start"}}>
                <div style={{height:22,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                  <span style={{color:theme.hText,fontSize:12,fontWeight:600,lineHeight:1}}>{inj.dose}mg · {inj.pen}번펜 {inj.shot}회차</span>
                  {inj.isDoseChange&&<span style={{background:P.neon,color:P.navy,fontSize:10,padding:"0.12em 9px 0",height:20,borderRadius:20,fontWeight:800,lineHeight:1,display:"inline-flex",alignItems:"center",position:"relative",top:-2}}>🔼 용량 증량</span>}
                </div>
                <div style={{color:theme.wkColor,fontSize:30,fontWeight:800,lineHeight:1,marginBottom:6}}>전체 {inj.week}주차</div>
                <div style={{color:theme.hSub,fontSize:12,lineHeight:1}}>투약일 {disp(inj.key)} ({dow(inj.key)})</div>
                <div style={{color:theme.hSub,fontSize:11,marginTop:4,lineHeight:1,minHeight:14}}>{inj.memo?`※ ${inj.memo}`:""}</div>
              </div>
                {/* 체중 박스 – 고정 크기, 내용 유무 관계없이 중앙정렬 */}
              <div style={{background:P.neon,borderRadius:14,width:82,height:86,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"0 10px",overflow:"hidden"}}>
                <div style={{color:P.navy,fontSize:10,lineHeight:1,marginBottom:4,fontWeight:600}}>체중</div>
                {curM.weight
                  ?<div style={{color:P.navy,fontSize:20,fontWeight:800,lineHeight:1}}>{curM.weight}<span style={{fontSize:11,fontWeight:500}}>kg</span></div>
                  :<div style={{color:`${P.navy}60`,fontSize:12,lineHeight:1}}>미측정</div>
                }
                {curM.waist&&<div style={{color:P.navy,fontSize:10,marginTop:4,lineHeight:1}}>허리 {curM.waist}cm</div>}
                {curM.bodyFat&&<div style={{color:P.navy,fontSize:10,marginTop:2,lineHeight:1}}>체지방 {curM.bodyFat}%</div>}
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12,height:34}}>
              <button onClick={goPrev} style={{background:theme.hNavBtn,border:"none",borderRadius:10,width:34,height:34,cursor:weekIdx>0?"pointer":"default",color:weekIdx>0?theme.hNavTxt:"rgba(128,128,128,0.3)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
              <div/>
              <button onClick={goNext} style={{background:theme.hNavBtn,border:"none",borderRadius:10,width:34,height:34,cursor:weekIdx<INJECTIONS.length-1?"pointer":"default",color:weekIdx<INJECTIONS.length-1?theme.hNavTxt:"rgba(128,128,128,0.3)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
            </div>
          </>
        ):(
          // 전체기록 헤더 – 누적변화 고정 표시
          (()=>{
            const withW =INJECTIONS.filter(i=>injM[i.key]?.weight);
            const withBF=INJECTIONS.filter(i=>injM[i.key]?.bodyFat!=null);
            const first =withW[0]?.weight||0, last=withW[withW.length-1]?.weight||0;
            const firstBF=withBF.length>0?injM[withBF[0].key].bodyFat:null;
            const lastBF =withBF.length>0?injM[withBF[withBF.length-1].key].bodyFat:null;
            const numSt={fontSize:15,fontWeight:800,color:"#fff",lineHeight:1,marginTop:3};
            const numNeon={fontSize:15,fontWeight:800,color:P.neon,lineHeight:1,marginTop:3};
            const sub={fontSize:9,fontWeight:600,color:"rgba(255,255,255,0.45)",lineHeight:1,marginTop:3};
            return (
              <>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{color:P.neon,fontSize:30,fontWeight:800,lineHeight:1,marginBottom:6}}>전체 {INJECTIONS.length}주차</div>
                    <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,lineHeight:1}}>누적 변화</div>
                  </div>
                  <div style={{background:P.neon,borderRadius:14,width:82,height:86,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"0 10px",overflow:"hidden"}}>
                    <div style={{color:P.navy,fontSize:10,lineHeight:1,marginBottom:2,fontWeight:600}}>현재</div>
                    <div style={{color:P.navy,fontSize:20,fontWeight:800,lineHeight:1,marginTop:3}}>{last}<span style={{fontSize:11,fontWeight:500}}>kg</span></div>
                    {lastBF&&<div style={{color:P.navy,fontSize:10,marginTop:4,lineHeight:1}}>체지방 {lastBF}%</div>}
                  </div>
                </div>
                {/* 시작 / 현재 / 변화 3열 */}
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  {[
                    {label:"시작", wt:first, bf:firstBF, neon:false},
                    {label:"현재", wt:last,  bf:lastBF,  neon:false},
                    {label:"변화", wt:`-${(first-last).toFixed(1)}`, bf:firstBF&&lastBF?`-${(firstBF-lastBF).toFixed(1)}`:null, neon:true},
                  ].map(({label,wt,bf,neon})=>(
                    <div key={label} style={{flex:1,background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"7px 10px"}}>
                      <div style={{fontSize:9,color:"rgba(255,255,255,0.5)",lineHeight:1}}>{label}</div>
                      <div style={neon?numNeon:numSt}>{wt}<span style={{fontSize:9,fontWeight:500}}>kg</span></div>
                      {bf!=null&&<div style={{...sub,color:neon?P.neon:"rgba(255,255,255,0.6)"}}>{bf}<span style={{fontSize:8}}>%</span></div>}
                    </div>
                  ))}
                </div>
              </>
            );
          })()
        )}
      </header>

      {tab==="week"&&(
        <>
          {/* Day strip */}
          <div style={{background:"#fff",padding:"10px",display:"flex",gap:5,borderBottom:"1px solid #e5e7eb",position:"sticky",top:0,zIndex:10}}>
            {weekDays.map(dk=>{
              const l=logs[dk]||{};
              const dj=INJ[dk],isInj=!!dj,isSel=dk===selDay;
              const dt=getTheme(dj?.dose||inj.dose);
              const isCustomInj=!isInj&&!!l?.customInj?.active;
              const isHighlighted=isInj||isCustomInj;
              const hasBleeding=l?.bowel?.bleeding;
              const hasBS=l?.bowel?.bloodInStool,isDia=(l?.bowel?.bristol||0)>=6;
              const isPainful=l?.bowel?.painful,hasPeriod=l?.period?.active;
              const hasPMS=l?.period?.pms||l?.period?.irregular;
              const hasSym=(l?.symptoms||[]).length>0;
              return (
                <div key={dk} onClick={()=>{setSelDay(dk);setEditing(false);}} style={{
                  flex:"1 1 0",minWidth:36,height:62,borderRadius:12,cursor:"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,
                  background:isSel?P.navy:isHighlighted?P.neon:"#f5f6fb",
                  border:isHighlighted&&!isSel?`1.5px solid ${P.navy}`:"1.5px solid transparent",
                  transition:"all 0.15s",boxSizing:"border-box",
                }}>
                  <span style={{fontSize:9,color:isSel?"rgba(255,255,255,0.65)":isHighlighted?P.navy:"#aaa",lineHeight:1}}>{dow(dk)}</span>
                  <span style={{fontSize:14,fontWeight:isSel?700:500,color:isSel?"#fff":isHighlighted?P.navy:"#374151",lineHeight:1}}>{parseInt(dk.slice(4,6))}</span>
                  {isInj&&<span style={{fontSize:8,lineHeight:1,color:isSel?P.neon:P.navy,fontWeight:700}}>💉</span>}
                  {isCustomInj&&<span style={{fontSize:8,lineHeight:1,color:isSel?P.neon:P.navy,fontWeight:700}}>💉</span>}
                  <div style={{display:"flex",justifyContent:"center",gap:1,flexWrap:"wrap",minHeight:9,alignItems:"center"}}>
                    {isPainful&&<span style={{fontSize:7,lineHeight:1}}>😖</span>}
                    {hasBleeding&&<span style={{fontSize:7,lineHeight:1}}>🔴</span>}
                    {hasBS&&<span style={{fontSize:7,lineHeight:1}}>🌶️</span>}
                    {isDia&&<span style={{fontSize:7,lineHeight:1}}>🫟</span>}
                    {hasPeriod&&<span style={{fontSize:7,lineHeight:1}}>🩸</span>}
                    {hasPMS&&<span style={{fontSize:7,lineHeight:1}}>🌀</span>}
                    {hasSym&&<span style={{fontSize:7,lineHeight:1}}>⚡</span>}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{padding:"14px 16px 100px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                <span style={{fontWeight:700,fontSize:17,color:"#1f2937",lineHeight:1}}>{disp(selDay)}</span>
                <span style={{fontSize:13,color:"#9ca3af",lineHeight:1}}>{dow(selDay)}요일</span>
                {injDay&&(
                  <span style={{background:P.neon,color:P.navy,fontSize:10,height:24,padding:"0 10px",paddingTop:2,paddingBottom:0,borderRadius:20,fontWeight:700,lineHeight:1,display:"inline-flex",alignItems:"center",gap:3,border:"1px solid rgba(37,58,130,0.25)"}}>
                    💉 투약일{injDay.isDoseChange?" 🔼":""}
                  </span>
                )}
              </div>
              {!editing&&(
                <button onClick={startEdit} style={{background:P.navy,color:"#fff",border:"none",borderRadius:10,height:BTN_H.small,padding:"0 14px",fontSize:12,fontWeight:700,cursor:"pointer",lineHeight:1,display:"inline-flex",alignItems:"center",gap:5,flexShrink:0,paddingTop:3}}>
                  ✏️ 기록
                </button>
              )}
            </div>
            {editing
              ?<EditForm log={editLog} injF={injF} setInjF={setInjF} isInjDay={!!injDay} curM={curM} theme={theme} setField={setField} toggleArr={toggleArr} setNested={setNested} toggleNestedArr={toggleNestedArr} onSave={saveEdit} onCancel={()=>setEditing(false)}/>
              :<DayView log={selLog} injDay={injDay} curM={curM} theme={theme} onEdit={startEdit}/>
            }
          </div>
        </>
      )}

      {tab==="history"&&<HistoryView injections={INJECTIONS} injM={injM} goals={goals} setGoals={setGoals} logs={logs} onSelectWeek={(i,k)=>{setWeekIdx(i);setSelDay(k);setTab("week");}}/>}

      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #e5e7eb",display:"flex",overflow:"hidden"}}>
        {[{id:"week",label:"주간기록"},{id:"history",label:"전체기록"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,height:52,border:"none",cursor:"pointer",background:tab===t.id?P.navy:"#fff",display:"flex",alignItems:"center",justifyContent:"center",paddingTop:3}}>
            <span style={{fontSize:14,fontWeight:tab===t.id?700:500,color:tab===t.id?"#fff":"#9ca3af",lineHeight:1}}>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── DayView ───────────────────────────────────────────────────
function DayView({log,injDay,curM,theme,onEdit}) {
  const hasContent=log&&Object.keys(log).some(k=>{
    if(k==="symptoms")return(log[k]||[]).length>0;
    if(k==="notes")return!!log[k];
    return log[k]!==null&&log[k]!==undefined;
  });
  if(!hasContent) return (
    <div style={{textAlign:"center",padding:"48px 20px"}}>
      <div style={{fontSize:44,marginBottom:12}}>📋</div>
      <div style={{fontSize:14,marginBottom:4,color:theme.dark,fontWeight:600,lineHeight:1}}>기록 없음</div>
      <div style={{fontSize:12,color:theme.primary,marginBottom:20,lineHeight:1.5}}>이날의 상태를 기록해보세요</div>
      <button onClick={onEdit} style={{background:P.navy,color:"#fff",border:"none",borderRadius:14,height:44,padding:"0 28px",fontSize:14,fontWeight:700,cursor:"pointer",display:"inline-flex",alignItems:"center",lineHeight:1,paddingTop:3}}>기록 추가하기</button>
    </div>
  );
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {injDay&&(
        <Card title="💉 투약일 신체 측정" accent={theme.dark}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["체중",curM.weight?`${curM.weight}kg`:"—"],["허리둘레",curM.waist?`${curM.waist}cm`:"—"],["체지방률",curM.bodyFat?`${curM.bodyFat}%`:"—"],["근육량",curM.muscle?`${curM.muscle}kg`:"—"]].map(([k,v])=>(
              <div key={k} style={{background:P.neon,borderRadius:10,padding:"9px 12px"}}>
                <div style={{fontSize:10,color:P.navy,marginBottom:4,fontWeight:600,lineHeight:1}}>{k}</div>
                <div style={{fontSize:16,fontWeight:700,color:P.navy,lineHeight:1}}>{v}</div>
              </div>
            ))}
          </div>
        </Card>
      )}
      {!injDay&&log.customInj?.active&&(
        <Card title="💉 투약 (비정기)" accent={P.blue}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{background:P.neon,borderRadius:10,padding:"9px 12px"}}>
              <div style={{fontSize:10,color:P.navy,fontWeight:600,lineHeight:1,marginBottom:4}}>용량</div>
              <div style={{fontSize:16,fontWeight:700,color:P.navy,lineHeight:1}}>{log.customInj.dose}mg</div>
            </div>
            {[["weight","체중","kg"],["waist","허리둘레","cm"],["bodyFat","체지방률","%"],["muscle","근육량","kg"]].filter(([k])=>log.customInj?.[k]).map(([k,label,unit])=>(
              <div key={k} style={{background:P.sky,borderRadius:10,padding:"9px 12px"}}>
                <div style={{fontSize:10,color:P.navy,fontWeight:600,lineHeight:1,marginBottom:4}}>{label}</div>
                <div style={{fontSize:16,fontWeight:700,color:P.navy,lineHeight:1}}>{log.customInj[k]}<span style={{fontSize:11,fontWeight:400}}>{unit}</span></div>
              </div>
            ))}
          </div>
        </Card>
      )}
      {(log.symptoms||[]).length>0&&<Card title="⚡ 증상"><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{(log.symptoms||[]).map(id=>{const s=SYMPTOMS.find(x=>x.id===id);return s?<Chip key={id} label={`${s.emoji} ${s.label}`} color={theme.primary}/>:null;})}</div></Card>}
      {log.appetite!==null&&log.appetite!==undefined&&(
        <Card title="식욕">
          {(()=>{const a=APPETITE.find(x=>x.v===log.appetite);return a?(<div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:21,fontWeight:800,color:a.tc,lineHeight:1}}>{a.v>0?"+":""}{a.v}</span><div style={{fontSize:12,color:"#6b7280",lineHeight:1}}>{a.label}</div></div>):null;})()}
        </Card>
      )}
      {log.bowel?.had&&(
        <Card title="💩 배변">
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            <Chip label={`${log.bowel.count||1}회`} color={theme.primary}/>
            {log.bowel.bristol!=null&&<Chip label={`브리스톨 ${log.bowel.bristol}형 · ${BRISTOL.find(b=>b.n===Math.round(log.bowel.bristol))?.label||""}`} color={BRISTOL.find(b=>b.n===Math.round(log.bowel.bristol))?.color}/>}
            {log.bowel.painful&&<Chip label="😖 통증" color="#FF75CF"/>}
            {log.bowel.bleeding&&<Chip label="🔴 출혈" color="#FF75CF"/>}
            {log.bowel.bloodInStool&&<Chip label="🌶️ 피비침" color="#FF75CF"/>}
            {(log.bowel.bristol||0)>=6&&<Chip label="🫟 설사변" color="#88A2FF"/>}
          </div>
        </Card>
      )}
      {log.period&&(
        <Card title="🩸 생리">
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {log.period.active&&<Chip label="생리중 🩸" color={P.pink} tc="#FF75CF"/>}
            {log.period.pms&&<Chip label="PMS 🌀" color={P.lavender} tc="#253A82"/>}
            {log.period.irregular&&<Chip label="부정출혈" color={P.pink} tc="#FF75CF"/>}
            {log.period.flow&&<Chip label={`생리량: ${PERIOD_FLOW.find(f=>f.id===log.period.flow)?.label}`} color={P.pink} tc="#FF75CF"/>}
            {(log.period.pain||[]).map(p=>{const pt=PERIOD_PAIN.find(x=>x.id===p);return pt?<Chip key={p} label={`${pt.emoji} ${pt.label}`} color={P.pink} tc="#FF75CF"/>:null;})}
          </div>
        </Card>
      )}
      {(log.sleep||log.energy)&&(
        <Card title="😴 컨디션">
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {log.sleep&&(()=>{const s=SLEEP_OPT.find(x=>x.v===log.sleep);return s?<Chip label={`🌙 ${s.label}`} color={s.color}/>:null;})()}
            {log.energy&&(()=>{const e=ENERGY.find(x=>x.v===log.energy);return e?<Chip label={`${e.icon} 에너지 ${e.label}`} color={e.color}/>:null;})()}
          </div>
        </Card>
      )}
      {log.notes&&<Card title="📝 메모"><div style={{fontSize:14,color:"#374151",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{log.notes}</div></Card>}
    </div>
  );
}

// ── HistoryView ───────────────────────────────────────────────
function HistoryView({injections,injM,goals,setGoals,logs,onSelectWeek}) {
  const [editGoals, setEditGoals] = useState(false);
  const [tmpGoals,  setTmpGoals]  = useState(goals);
  const [showPDF,   setShowPDF]   = useState(false);
  const saveGoals = () => { setGoals(tmpGoals); setEditGoals(false); };

  // ── PDF 헬퍼 (이모지 없음) ────────────────────────────────
  const sLabel = id => SYMPTOMS.find(s=>s.id===id)?.label||id;
  const aLabel = v  => { const a=APPETITE.find(x=>x.v===v); return a?`${v>0?'+':''}${v} ${a.label}`:''; };
  const bLabel = b  => {
    if(!b?.had) return b===null?'없음':'';
    let t=`${b.count||1}회`;
    if(b.bristol){const br=BRISTOL.find(x=>x.n===Math.round(b.bristol));t+=` ${b.bristol}형${br?' ('+br.label+')':''}`;}
    if(b.painful) t+=' / 통증';
    if(b.bleeding) t+=' / 출혈';
    if(b.bloodInStool) t+=' / 피비침';
    return t;
  };
  const pLabel = p  => {
    if(!p) return '';
    const parts=[];
    if(p.active) parts.push('생리중');
    if(p.pms) parts.push('PMS');
    if(p.irregular) parts.push('부정출혈');
    if(p.flow) parts.push(PERIOD_FLOW.find(f=>f.id===p.flow)?.label||'');
    if(p.pain?.length) parts.push(p.pain.map(id=>PERIOD_PAIN.find(x=>x.id===id)?.label||id).join(', '));
    return parts.filter(Boolean).join(' / ');
  };
  const stripEmoji = s => (s||'').replace(/\p{Emoji}/gu,'').trim();

  // ── PDF 뷰 렌더 ────────────────────────────────────────────
  if(showPDF) {
    const tdS = {padding:"4px 7px",fontSize:10,verticalAlign:"top",borderBottom:"1px solid #f3f4f6"};
    const thS = {padding:"5px 7px",fontSize:9,color:"#6b7280",fontWeight:600,background:"#f8fafc",borderBottom:"1px solid #e5e7eb",textAlign:"left"};
    return (
      <div style={{background:"#fff",minHeight:"100vh",padding:"20px 20px 40px",fontFamily:"'Apple SD Gothic Neo',sans-serif"}}>
        <style>{`@media print{.noprint{display:none!important}}`}</style>

        {/* 상단 버튼 */}
        <div className="noprint" style={{display:"flex",gap:8,marginBottom:20}}>
          <button onClick={()=>window.print()}
            style={{flex:1,height:42,borderRadius:12,border:"none",background:P.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            인쇄 / PDF 저장
          </button>
          <button onClick={()=>setShowPDF(false)}
            style={{width:80,height:42,borderRadius:12,border:`1.5px solid #e2e8f0`,background:"#fff",color:"#6b7280",fontWeight:600,fontSize:13,cursor:"pointer"}}>
            닫기
          </button>
        </div>

        {/* 제목 */}
        <h1 style={{fontSize:20,fontWeight:800,color:P.navy,margin:"0 0 2px"}}>마운자로 투약 일지</h1>
        <p style={{fontSize:11,color:"#6b7280",marginBottom:22}}>총 {injections.length}주차 | 추출일 {new Date().toLocaleDateString('ko-KR')}</p>

        {injections.map(inj=>{
          const m=injM[inj.key]||{};
          const weekDays=Array.from({length:7},(_,i)=>shift(inj.key,i));
          const rows=weekDays.map(dk=>{
            const log=logs[dk];
            if(!log&&dk!==inj.key) return null;
            const symp=(log?.symptoms||[]).map(sLabel).join(', ');
            const app=log?.appetite!=null?aLabel(log.appetite):'';
            const bwl=bLabel(log?.bowel);
            const per=pLabel(log?.period);
            const note=stripEmoji(log?.notes||'');
            if(!symp&&!app&&!bwl&&!per&&!note&&dk!==inj.key) return null;
            return {dk,symp,app,bwl,per,note};
          }).filter(Boolean);

          return (
            <div key={inj.key} style={{marginBottom:14,border:"1px solid #e5e7eb",borderRadius:8,overflow:"hidden",pageBreakInside:"avoid"}}>
              {/* 주차 헤더 */}
              <div style={{background:P.navy,color:"#fff",padding:"7px 12px",fontSize:11,fontWeight:700}}>
                {inj.week}주차 &nbsp;|&nbsp; {disp(inj.key)} ({dow(inj.key)}) &nbsp;|&nbsp; {inj.dose}mg &nbsp;|&nbsp; {inj.pen}번펜 {inj.shot}회차{inj.isDoseChange?' &nbsp;|&nbsp; 용량 증량':''}
              </div>
              {/* 신체 측정 */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:"#e5e7eb"}}>
                {[["체중",m.weight?m.weight+"kg":"-"],["허리둘레",m.waist?m.waist+"cm":"-"],["체지방률",m.bodyFat?m.bodyFat+"%":"-"],["근육량",m.muscle?m.muscle+"kg":"-"]].map(([k,v])=>(
                  <div key={k} style={{background:"#f8fafc",padding:"6px 8px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#6b7280"}}>{k}</div>
                    <div style={{fontSize:13,fontWeight:700,color:P.navy}}>{v}</div>
                  </div>
                ))}
              </div>
              {/* 일별 기록 */}
              {rows.length>0&&(
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr>{["날짜","증상","식욕","배변","생리","메모"].map(h=><th key={h} style={thS}>{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {rows.map(({dk,symp,app,bwl,per,note})=>(
                      <tr key={dk}>
                        <td style={{...tdS,fontWeight:600,whiteSpace:"nowrap"}}>{disp(dk)} ({dow(dk)})</td>
                        <td style={{...tdS,color:symp?"#374151":"#d1d5db"}}>{symp||"-"}</td>
                        <td style={{...tdS,color:app?"#374151":"#d1d5db"}}>{app||"-"}</td>
                        <td style={{...tdS,color:bwl?"#374151":"#d1d5db"}}>{bwl||"-"}</td>
                        <td style={{...tdS,color:per?"#374151":"#d1d5db"}}>{per||"-"}</td>
                        <td style={{...tdS,color:note?"#374151":"#d1d5db"}}>{note||"-"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  const withW  = injections.filter(i=>injM[i.key]?.weight);
  const withBF = injections.filter(i=>injM[i.key]?.bodyFat!=null);
  const first  = withW[0]?.weight||0,last=withW[withW.length-1]?.weight||0;
  const firstBF= withBF.length>0 ? injM[withBF[0].key].bodyFat : null;
  const lastBF = withBF.length>0 ? injM[withBF[withBF.length-1].key].bodyFat : null;
  const totalLoss=(first-last).toFixed(1);

  const wtPct = first>goals.weight && last<first
    ? Math.min(100,Math.round((first-last)/(first-goals.weight)*100)) : 0;
  const bfPct = firstBF&&lastBF&&firstBF>goals.bodyFat
    ? Math.min(100,Math.round((firstBF-lastBF)/(firstBF-goals.bodyFat)*100)) : 0;

  const weightData=withW.map(i=>({week:`${i.week}주`,weight:injM[i.key].weight,dose:i.dose}));
  const bfData    =withBF.map(i=>({week:`${i.week}주`,bodyFat:injM[i.key].bodyFat,dose:i.dose}));
  const doseChangeWeek=injections.find(i=>i.isDoseChange)?.week;

  const Dot=null; // SVG 차트로 대체됨

  return (
    <div style={{padding:"16px 16px 100px"}}>

      {/* PDF 추출 */}
      <button onClick={()=>setShowPDF(true)} style={{
        width:"100%",height:44,borderRadius:14,border:`1.5px solid ${P.navy}`,
        background:"#fff",color:P.navy,fontWeight:700,fontSize:13,cursor:"pointer",
        lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,
        marginBottom:14,paddingTop:2,paddingBottom:0,
      }}>
        전체 기록 PDF 추출
      </button>

      {/* 목표 달성률 */}
      <div style={{background:"#fff",borderRadius:20,padding:18,marginBottom:14,boxShadow:`0 3px 12px ${P.blue}15`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,color:P.navy,lineHeight:1}}>목표 달성률</div>
          <button onClick={()=>{setTmpGoals(goals);setEditGoals(e=>!e);}}
            style={{height:28,padding:"0 12px",paddingTop:3,borderRadius:20,border:`1.5px solid ${P.blue}`,background:"#f5f6fb",fontSize:11,fontWeight:600,color:P.navy,cursor:"pointer",lineHeight:1,display:"inline-flex",alignItems:"center"}}>
            {editGoals?"취소":"목표 수정"}
          </button>
        </div>

        {editGoals&&(
          <div style={{background:`${P.sky}35`,borderRadius:14,padding:14,marginBottom:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              {[["weight","목표 체중","kg"],["bodyFat","목표 체지방률","%"]].map(([f,label,unit])=>(
                <div key={f}>
                  <div style={{fontSize:11,color:P.navy,fontWeight:600,marginBottom:5,lineHeight:1}}>{label}</div>
                  <div style={{display:"flex",alignItems:"center",height:36,background:"#fff",borderRadius:10,overflow:"hidden",border:`1.5px solid ${P.blue}`}}>
                    <input type="number" step="0.1" value={tmpGoals[f]}
                      onChange={e=>setTmpGoals(p=>({...p,[f]:parseFloat(e.target.value)||p[f]}))}
                      style={{flex:1,border:"none",background:"transparent",padding:"0 10px",fontSize:14,fontWeight:600,color:P.navy,outline:"none",lineHeight:1}}/>
                    <span style={{fontSize:11,color:P.blue,paddingRight:8,fontWeight:600}}>{unit}</span>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={saveGoals} style={{width:"100%",height:36,borderRadius:10,border:"none",background:P.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>저장</button>
          </div>
        )}

        {[
          {label:"체중",cur:last,goal:goals.weight,unit:"kg",pct:wtPct,rem:(last-goals.weight).toFixed(1)},
          {label:"체지방률",cur:lastBF,goal:goals.bodyFat,unit:"%",pct:bfPct,rem:lastBF?(lastBF-goals.bodyFat).toFixed(1):"-"},
        ].map(({label,cur,goal,unit,pct,rem},idx)=>(
          <div key={label} style={{marginBottom:idx===0?14:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:600,color:P.navy,lineHeight:1}}>{label}</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:10,color:"#9ca3af",lineHeight:1}}>{cur}{unit} → 목표 {goal}{unit}</span>
                <span style={{fontSize:15,fontWeight:800,color:pct>=100?P.neon:P.blue,lineHeight:1}}>{pct}%</span>
              </div>
            </div>
            <div style={{height:10,background:"#f0f1f3",borderRadius:5,overflow:"hidden",marginBottom:4}}>
              <div style={{height:"100%",width:`${Math.max(pct,2)}%`,background:P.neon,borderRadius:5,transition:"width 0.5s"}}/>
            </div>
            <div style={{fontSize:10,color:"#9ca3af",lineHeight:1}}>목표까지 {rem}{unit} 남음</div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:20,padding:"16px 4px 12px",marginBottom:14,boxShadow:`0 3px 12px ${P.blue}18`}}>
        <div style={{paddingLeft:12,marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",paddingRight:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#374151",lineHeight:1}}>체중 변화</div>
          <div style={{display:"flex",gap:12}}>
            <span style={{fontSize:10,color:"#6b7280",display:"flex",alignItems:"center",gap:3,lineHeight:1}}><span style={{width:9,height:9,borderRadius:"50%",background:P.blue,border:`1.5px solid ${P.navy}`,display:"inline-block"}}/>2.5mg</span>
            <span style={{fontSize:10,color:"#6b7280",display:"flex",alignItems:"center",gap:3,lineHeight:1}}><span style={{width:9,height:9,borderRadius:"50%",background:P.pink,border:`1.5px solid ${P.lavender}`,display:"inline-block"}}/>5.0mg</span>
          </div>
        </div>
        <div style={{paddingLeft:12,marginBottom:8}}>
          <span style={{fontSize:10,color:P.lavender,fontWeight:600,lineHeight:1}}>5.0mg 증량 ({doseChangeWeek}주~)</span>
        </div>
        <SvgChart data={weightData} dataKey="weight" color={P.blue} unit="kg" doseChangeWeek={doseChangeWeek} h={160}/>
      </div>

      {/* 체지방률 그래프 */}
      <div style={{background:"#fff",borderRadius:20,padding:"16px 4px 12px",marginBottom:14,boxShadow:`0 3px 12px ${P.blue}18`}}>
        <div style={{paddingLeft:12,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"#374151",lineHeight:1}}>체지방률 변화</div>
        </div>
        {bfData.length>=2?(
          <SvgChart data={bfData} dataKey="bodyFat" color={P.lavender} unit="%" h={140}/>
        ):(
          <div style={{textAlign:"center",padding:"18px 16px 16px",color:"#aaa"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#9ca3af",lineHeight:1,marginBottom:6}}>{bfData.length===1?`현재 ${bfData[0].bodyFat}% (1개 기록)`:"데이터 없음"}</div>
            <div style={{fontSize:11,color:"#c4c4c4",lineHeight:1.5}}>투약일에 인바디 측정 후<br/>기록 버튼으로 입력해주세요</div>
          </div>
        )}
      </div>

      {/* 투약 목록 */}
      <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:10,lineHeight:1}}>투약 목록</div>
      {[...injections].reverse().map((inj,i)=>{
        const origIdx=injections.length-1-i;
        const prev=injections[origIdx-1];
        const m=injM[inj.key]||{},pm=prev?injM[prev.key]||{}:{};
        const diff=prev&&m.weight&&pm.weight?(m.weight-pm.weight).toFixed(1):null;
        const diffNum=diff?parseFloat(diff):0;
        const t=getTheme(inj.dose);
        return (
          <div key={inj.key} onClick={()=>onSelectWeek(origIdx,inj.key)}
            style={{background:"#fff",borderRadius:16,padding:16,marginBottom:9,boxShadow:`0 3px 12px ${P.blue}15`,cursor:"pointer",border:`1.5px solid ${t.hBg}60`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{background:t.hBg,color:t.hText,fontSize:10,height:22,padding:"0 10px",paddingTop:2,paddingBottom:0,borderRadius:20,fontWeight:700,lineHeight:1,display:"inline-flex",alignItems:"center",flexShrink:0}}>{inj.week}주차</span>
                  {inj.isDoseChange&&<span style={{background:P.neon,color:P.navy,fontSize:10,height:22,padding:"0 8px",paddingTop:2,paddingBottom:0,borderRadius:20,fontWeight:800,lineHeight:1,display:"inline-flex",alignItems:"center",flexShrink:0}}>5.0mg 시작</span>}
                  <span style={{fontSize:11,color:"#9ca3af",lineHeight:1}}>{disp(inj.key)} · {inj.dose}mg · {inj.pen}번펜 {inj.shot}회차</span>
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                  {m.weight?<span style={{fontWeight:700,fontSize:16,color:"#1f2937",lineHeight:1}}>{m.weight}kg</span>:<span style={{fontSize:13,color:"#d1d5db",lineHeight:1}}>체중 미측정</span>}
                  {m.waist  &&<span style={{fontSize:12,color:"#6b7280",lineHeight:1}}>허리 {m.waist}cm</span>}
                  {m.bodyFat&&<span style={{fontSize:12,color:P.lavender,fontWeight:600,lineHeight:1}}>체지방 {m.bodyFat}%</span>}
                  {m.muscle &&<span style={{fontSize:12,color:"#6b7280",lineHeight:1}}>근육 {m.muscle}kg</span>}
                </div>
              </div>
              {diff&&<div style={{height:28,padding:"0 10px",borderRadius:20,fontSize:12,fontWeight:700,flexShrink:0,display:"flex",alignItems:"center",paddingTop:3,background:diffNum<0?`${P.sky}60`:diffNum>0?`${P.pink}50`:"#f3f4f6",color:diffNum<0?P.navy:diffNum>0?"#FF75CF":"#6b7280"}}>{diffNum>0?"+":""}{diff}kg</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── 공용 컴포넌트 ──────────────────────────────────────────────
function Card({title,children,accent}) {
  return (
    <div style={{background:"#fff",borderRadius:18,padding:16,boxShadow:`0 3px 12px ${P.blue}12`}}>
      <div style={{fontWeight:700,fontSize:13,color:accent||P.navy,marginBottom:12,lineHeight:1}}>{title}</div>
      {children}
    </div>
  );
}
// 비대칭 패딩으로 폰트 메트릭 보정 → 상하 시각적 균형
function Chip({label,color,tc}) {
  return (
    <span style={{
      display:"inline-flex",alignItems:"center",
      padding:"0.42em 12px 0.28em",
      borderRadius:20,fontSize:12,fontWeight:600,lineHeight:1,
      background:color?color+"22":"#f0f5ff",
      color:tc||(color||P.navy),
      border:`1px solid ${color?color+"55":P.sky}`,
    }}>
      {label}
    </span>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

  </script>
</body>
</html>
